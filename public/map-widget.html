<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인천공항 교통 안내</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#0f1117;color:#fff;font-family:-apple-system,sans-serif;overflow:hidden;}
    #root{display:flex;flex-direction:column;width:100vw;height:100vh;}
    #hd{padding:12px 16px;background:#0f1117;border-bottom:1px solid #1e2030;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    #hd h1{font-size:14px;font-weight:700;margin:0;}
    #hd p{font-size:11px;color:#6b7280;margin:2px 0 0;}
    #ft{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
    #ft::-webkit-scrollbar{display:none;}
    .fb{padding:4px 12px;border-radius:20px;border:1px solid #2d3148;background:transparent;color:#9ca3af;font-size:11px;cursor:pointer;white-space:nowrap;}
    .fb.on{background:#3b82f6;border-color:#3b82f6;color:#fff;font-weight:600;}
    #mw{flex:1;position:relative;min-height:0;}
    #nmap{position:absolute;top:0;left:0;width:100%;height:100%;}
    #cw{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 12px 12px;}
    #cards{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
    #cards::-webkit-scrollbar{display:none;}
    .card{flex-shrink:0;width:185px;background:rgba(15,17,23,.96);border:1px solid #2d3148;border-radius:12px;padding:11px;cursor:pointer;transition:all .2s;}
    .card:hover,.card.on{border-color:#3b82f6;transform:translateY(-2px);}
    .ct{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .ci{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .cn{font-size:12px;font-weight:700;}
    .cl{font-size:10px;color:#6b7280;}
    .cs{display:flex;gap:5px;}
    .st{flex:1;background:#1a1d2e;border-radius:6px;padding:5px;text-align:center;}
    .sv{font-size:10px;font-weight:700;}
    .sl{font-size:9px;color:#6b7280;margin-top:1px;}
    #loading{position:absolute;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:100;}
    .spin{width:28px;height:28px;border:3px solid #2d3148;border-top-color:#3b82f6;border-radius:50%;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
    #loading p{font-size:12px;color:#6b7280;}
  </style>
</head>
<body>
<div id="root">
  <div id="hd">
    <span style="font-size:18px">✈️</span>
    <div><h1 id="ht">인천공항 교통 안내</h1><p id="hs">출발지 주변 교통편을 확인하세요</p></div>
  </div>
  <div id="ft">
    <button class="fb on" onclick="setF('all',this)">전체</button>
    <button class="fb" onclick="setF('rail',this)">🚇 철도</button>
    <button class="fb" onclick="setF('bus',this)">🚌 버스</button>
    <button class="fb" onclick="setF('taxi',this)">🚕 택시</button>
  </div>
  <div id="mw">
    <div id="nmap"></div>
    <div id="loading"><div class="spin"></div><p>지도 불러오는 중...</p></div>
    <div id="cw"><div id="cards"></div></div>
  </div>
</div>

<script>
// ── 상태 ──────────────────────────────────────────────────────────────────────
let nmap = null, filt = 'all', markers = [], polyline = null;
let toolData = null;

const DEFAULT_PTS = [
  {id:"arex1",type:"rail",  name:"공항철도 직통",icon:"🚇",color:"#3b82f6",lat:37.5546,lng:126.9706,loc:"서울역",    time:"43분",     price:"11,000원",       gap:"30분"},
  {id:"arex2",type:"rail",  name:"공항철도 일반",icon:"🚇",color:"#60a5fa",lat:37.5546,lng:126.9706,loc:"서울역",    time:"66분",     price:"4,150원",        gap:"6~12분"},
  {id:"bus1", type:"bus",   name:"리무진 6103", icon:"🚌",color:"#22c55e",lat:37.4979,lng:127.0276,loc:"강남역",    time:"80~110분", price:"17,000원",       gap:"15~20분"},
  {id:"bus2", type:"bus",   name:"리무진 6001", icon:"🚌",color:"#4ade80",lat:37.5133,lng:127.1000,loc:"잠실역",    time:"70~100분", price:"17,000원",       gap:"20~30분"},
  {id:"bus3", type:"bus",   name:"리무진 6020", icon:"🚌",color:"#86efac",lat:37.5636,lng:126.9869,loc:"명동",      time:"60~90분",  price:"15,000원",       gap:"15~20분"},
  {id:"bus4", type:"bus",   name:"리무진 6030", icon:"🚌",color:"#bbf7d0",lat:37.5552,lng:126.9368,loc:"신촌·홍대", time:"50~80분",  price:"15,000원",       gap:"20분"},
  {id:"taxi1",type:"taxi",  name:"택시",        icon:"🚕",color:"#f59e0b",lat:37.5665,lng:126.9780,loc:"서울 시내", time:"50~90분",  price:"60,000~90,000원",gap:"24시간"},
];

// ── 네이버 지도 초기화 ────────────────────────────────────────────────────────
function initNaverMap(clientId) {
  const script = document.createElement('script');
  script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${clientId}&submodules=geocoder`;
  script.onload = () => {
    nmap = new naver.maps.Map('nmap', {
      center: new naver.maps.LatLng(37.52, 126.75),
      zoom: 11,
      mapTypeId: naver.maps.MapTypeId.NORMAL,
    });
    // 다크 스타일 적용
    nmap.setOptions({ background: '#0f1117' });
    document.getElementById('loading').style.display = 'none';

    // 공항 마커
    addMarker(37.4602, 126.4407, '✈️', '#ef4444', '인천국제공항', true);

    // 기본 마커 표시
    renderMarkers(DEFAULT_PTS);
    renderCards(DEFAULT_PTS);

    // 데이터가 이미 도착했으면 바로 적용
    if (toolData) applyData(toolData);
  };
  script.onerror = () => {
    // 네이버 맵 로드 실패 시 fallback
    document.getElementById('loading').innerHTML = '<p style="color:#ef4444">지도 로드 실패. Client ID를 확인해주세요.</p>';
  };
  document.head.appendChild(script);
}

// ── 마커 관리 ─────────────────────────────────────────────────────────────────
function addMarker(lat, lng, icon, color, title, isAirport=false) {
  if (!nmap) return null;
  const size = isAirport ? 18 : 13;
  const marker = new naver.maps.Marker({
    position: new naver.maps.LatLng(lat, lng),
    map: nmap,
    icon: {
      content: `<div style="
        background:${color};border:2px solid #fff;border-radius:50%;
        width:${size}px;height:${size}px;
        box-shadow:0 2px 8px ${color}99;
        display:flex;align-items:center;justify-content:center;
        font-size:${isAirport?9:0}px;color:#fff;font-weight:bold;
      ">${isAirport?'✈':''}</div>`,
      anchor: new naver.maps.Point(size/2, size/2),
    },
    title,
  });

  // 정보창
  const iw = new naver.maps.InfoWindow({
    content: `<div style="background:#1a1d2e;border:1px solid #2d3148;border-radius:8px;padding:8px 10px;color:#fff;font-family:-apple-system,sans-serif;">
      <div style="font-size:12px;font-weight:700">${icon} ${title}</div>
    </div>`,
    borderWidth: 0,
    backgroundColor: 'transparent',
    disableAnchor: true,
  });

  naver.maps.Event.addListener(marker, 'click', () => {
    if (iw.getMap()) iw.close(); else iw.open(nmap, marker);
  });

  markers.push(marker);
  return marker;
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
}

function clearPolyline() {
  if (polyline) { polyline.setMap(null); polyline = null; }
}

function renderMarkers(pts) {
  clearMarkers();
  addMarker(37.4602, 126.4407, '✈️', '#ef4444', '인천국제공항', true);
  const vis = filt==='all' ? pts : pts.filter(p=>p.type===filt);
  vis.forEach(p => addMarker(p.lat, p.lng, p.icon, p.color, p.name));
}

// ── 경로 그리기 ───────────────────────────────────────────────────────────────
function drawPath(pathCoords) {
  clearPolyline();
  if (!pathCoords || !nmap) return;
  // Directions API path: [[lng, lat], ...]
  const coords = pathCoords.map(([lng,lat]) => new naver.maps.LatLng(lat, lng));
  polyline = new naver.maps.Polyline({
    map: nmap,
    path: coords,
    strokeColor: '#3b82f6',
    strokeWeight: 4,
    strokeOpacity: 0.85,
    strokeStyle: 'solid',
  });
}

// ── 카드 렌더 ─────────────────────────────────────────────────────────────────
function renderCards(pts) {
  const list = filt==='all' ? pts.filter(p=>p.type!=='airport') : pts.filter(p=>p.type===filt);
  document.getElementById('cards').innerHTML = list.map(p=>`
    <div class="card" id="c-${p.id}" onclick="focusPt(${p.lat},${p.lng},'${p.id}')">
      <div class="ct">
        <div class="ci" style="background:${p.color}22">${p.icon}</div>
        <div><div class="cn">${p.name}</div><div class="cl">${p.loc}</div></div>
      </div>
      <div class="cs">
        <div class="st"><div class="sv">${p.time}</div><div class="sl">소요</div></div>
        <div class="st"><div class="sv" style="font-size:9px">${p.price}</div><div class="sl">요금</div></div>
        <div class="st"><div class="sv" style="font-size:9px">${p.gap||'-'}</div><div class="sl">간격</div></div>
      </div>
    </div>`).join('');
}

function focusPt(lat, lng, id) {
  if (nmap) nmap.panTo(new naver.maps.LatLng(lat, lng));
  hlCard(id);
}

function hlCard(id) {
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c = document.getElementById('c-'+id);
  if(c){c.classList.add('on');c.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
}

function setF(type, btn) {
  filt = type;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const pts = toolData?.transit || DEFAULT_PTS;
  renderMarkers(pts); renderCards(pts);
}

// ── 데이터 적용 ───────────────────────────────────────────────────────────────
function applyData(data) {
  if (!data || !nmap) { toolData = data; return; }
  toolData = data;

  if (data.title) document.getElementById('ht').textContent = data.title;
  if (data.subtitle) document.getElementById('hs').textContent = data.subtitle;

  const pts = data.transit || DEFAULT_PTS;
  renderMarkers(pts);
  renderCards(pts);

  // 출발지 마커 (빨간 핀)
  if (data.origin) {
    const origin = new naver.maps.Marker({
      position: new naver.maps.LatLng(data.origin.lat, data.origin.lng),
      map: nmap,
      icon: {
        content: `<div style="background:#ef4444;border:3px solid #fff;border-radius:50%;width:16px;height:16px;box-shadow:0 2px 10px rgba(239,68,68,.8);"></div>`,
        anchor: new naver.maps.Point(8,8),
      },
      title: data.origin.name,
      zIndex: 100,
    });
    markers.push(origin);
  }

  // 경로 그리기
  if (data.path) drawPath(data.path);

  // 지도 포커스
  if (data.focus) {
    nmap.setCenter(new naver.maps.LatLng(data.focus.lat, data.focus.lng));
    nmap.setZoom(12);
  }

  if (data.highlight) setTimeout(()=>hlCard(data.highlight), 400);
}

// ── Apps SDK 연동 ─────────────────────────────────────────────────────────────
function handleToolOutput(data) {
  if (!data) return;
  // 네이버 맵이 아직 로드 안 됐으면 저장만 해둠
  if (!nmap) { toolData = data; return; }
  applyData(data);
}

try {
  // Client ID를 서버에서 주입받아 지도 초기화
  const clientId = document.currentScript?.dataset?.clientId || '__NAVER_CLIENT_ID__';
  initNaverMap(clientId);

  if (window.openai) {
    handleToolOutput(window.openai.toolOutput);
    window.openai.onToolOutput = handleToolOutput;
  }
  window.addEventListener('message', e => {
    if (e.data?.method === 'ui/notifications/tool-result') handleToolOutput(e.data?.params?.structuredContent);
    if (e.data?.result?.structuredContent) handleToolOutput(e.data.result.structuredContent);
  });
} catch(e) { console.error(e); }
</script>
</body>
</html>
