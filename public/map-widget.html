<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>인천공항 교통 안내</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#0f1117;color:#fff;font-family:-apple-system,sans-serif;overflow:hidden;}
    #root{display:flex;flex-direction:column;width:100vw;height:100vh;}
    #hd{padding:12px 16px;background:#0f1117;border-bottom:1px solid #1e2030;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    #hd h1{font-size:14px;font-weight:700;margin:0;}
    #hd p{font-size:11px;color:#6b7280;margin:2px 0 0;}
    #ft{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
    #ft::-webkit-scrollbar{display:none;}
    .fb{padding:4px 12px;border-radius:20px;border:1px solid #2d3148;background:transparent;color:#9ca3af;font-size:11px;cursor:pointer;white-space:nowrap;}
    .fb.on{background:#3b82f6;border-color:#3b82f6;color:#fff;font-weight:600;}
    #mw{flex:1;position:relative;min-height:0;}
    #nmap{position:absolute;top:0;left:0;width:100%;height:100%;}
    #cw{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 12px 12px;}
    #cards{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
    #cards::-webkit-scrollbar{display:none;}
    .card{flex-shrink:0;width:185px;background:rgba(15,17,23,.96);border:1px solid #2d3148;border-radius:12px;padding:11px;cursor:pointer;transition:all .2s;}
    .card:hover,.card.on{border-color:#3b82f6;transform:translateY(-2px);}
    .ct{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .ci{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .cn{font-size:12px;font-weight:700;}
    .cl{font-size:10px;color:#6b7280;}
    .cs{display:flex;gap:5px;}
    .st{flex:1;background:#1a1d2e;border-radius:6px;padding:5px;text-align:center;}
    .sv{font-size:10px;font-weight:700;}
    .sl{font-size:9px;color:#6b7280;margin-top:1px;}
    #loading{position:absolute;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:100;}
    .spin{width:28px;height:28px;border:3px solid #2d3148;border-top-color:#3b82f6;border-radius:50%;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
    #loading p{font-size:12px;color:#6b7280;}
  </style>
</head>
<body>
<div id="root">
  <div id="hd">
    <span style="font-size:18px">✈️</span>
    <div><h1 id="ht">인천공항 교통 안내</h1><p id="hs">출발지 주변 교통편을 확인하세요</p></div>
  </div>
  <div id="ft">
    <button class="fb on" onclick="setF('all',this)">전체</button>
    <button class="fb" onclick="setF('rail',this)">🚇 철도</button>
    <button class="fb" onclick="setF('bus',this)">🚌 버스</button>
    <button class="fb" onclick="setF('taxi',this)">🚕 택시</button>
  </div>
  <div id="mw">
    <div id="nmap"></div>
    <div id="loading"><div class="spin"></div><p>지도 불러오는 중...</p></div>
    <div id="cw"><div id="cards"></div></div>
  </div>
</div>

<script>
const NAVER_ID = "swz1idzhg6";
const AIRPORT = {lat:37.4602, lng:126.4407};
let nmap=null, filt='all', markers=[], polyline=null, toolData=null;

// ── 네이버 지도 초기화 ────────────────────────────────────────────────────────
function initMap() {
  const script = document.createElement('script');
  script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${NAVER_ID}`;
  script.onload = () => {
    nmap = new naver.maps.Map('nmap', {
      center: new naver.maps.LatLng(37.52, 126.75),
      zoom: 10,
      mapTypeId: naver.maps.MapTypeId.NORMAL,
    });
    document.getElementById('loading').style.display = 'none';

    // 공항 마커
    addMarker(AIRPORT.lat, AIRPORT.lng, '#ef4444', '✈️', '인천국제공항', true);

    if(toolData) applyData(toolData);
  };
  script.onerror = (e) => {
    console.error('Naver map load error', e);
    document.getElementById('loading').innerHTML = '<p style="color:#ef4444;padding:20px;text-align:center">지도 로드 실패<br><small>'+location.hostname+'</small></p>';
  };
  document.head.appendChild(script);
}

// ── 마커 ──────────────────────────────────────────────────────────────────────
function addMarker(lat, lng, color, icon, title, isAirport=false) {
  if(!nmap) return null;
  const size = isAirport ? 20 : 14;
  const marker = new naver.maps.Marker({
    position: new naver.maps.LatLng(lat, lng),
    map: nmap,
    icon: {
      content: `<div style="background:${color};border:2px solid #fff;border-radius:50%;width:${size}px;height:${size}px;box-shadow:0 2px 8px ${color}99;display:flex;align-items:center;justify-content:center;font-size:${isAirport?10:0}px;">${isAirport?'✈':''}</div>`,
      anchor: new naver.maps.Point(size/2, size/2),
    },
    title,
    zIndex: isAirport ? 10 : 5,
  });
  markers.push(marker);
  return marker;
}

function clearMarkers() { markers.forEach(m=>m.setMap(null)); markers=[]; }
function clearPolyline() { if(polyline){polyline.setMap(null);polyline=null;} }

// ── 경로 ──────────────────────────────────────────────────────────────────────
function drawPath(pathCoords) {
  clearPolyline();
  if(!pathCoords||!nmap) return;
  const coords = pathCoords.map(([lng,lat])=>new naver.maps.LatLng(lat,lng));
  polyline = new naver.maps.Polyline({
    map: nmap,
    path: coords,
    strokeColor: '#3b82f6',
    strokeWeight: 5,
    strokeOpacity: 0.9,
    strokeStyle: 'solid',
  });
}

// ── 카드 ──────────────────────────────────────────────────────────────────────
function renderCards(pts) {
  const list = filt==='all' ? pts.filter(p=>p.type!=='airport') : pts.filter(p=>p.type===filt);
  document.getElementById('cards').innerHTML = list.map(p=>`
    <div class="card" id="c-${p.id}" onclick="focusPt(${p.lat},${p.lng},'${p.id}')">
      <div class="ct">
        <div class="ci" style="background:${p.color}22">${p.icon}</div>
        <div><div class="cn">${p.name}</div><div class="cl">${p.loc}</div></div>
      </div>
      <div class="cs">
        <div class="st"><div class="sv">${p.time}</div><div class="sl">소요</div></div>
        <div class="st"><div class="sv" style="font-size:9px">${p.price}</div><div class="sl">요금</div></div>
        <div class="st"><div class="sv" style="font-size:9px">${p.gap||'-'}</div><div class="sl">간격</div></div>
      </div>
    </div>`).join('');
}

function focusPt(lat,lng,id) {
  if(nmap) nmap.panTo(new naver.maps.LatLng(lat,lng));
  hlCard(id);
}

function hlCard(id) {
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c-'+id);
  if(c){c.classList.add('on');c.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
}

function setF(type,btn) {
  filt=type;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(toolData?.transit) renderCards(toolData.transit);
}

// ── 데이터 적용 ───────────────────────────────────────────────────────────────
function applyData(data) {
  if(!data) return;
  toolData = data;
  if(!nmap) return;

  if(data.title) document.getElementById('ht').textContent=data.title;
  if(data.subtitle) document.getElementById('hs').textContent=data.subtitle;

  clearMarkers();
  addMarker(AIRPORT.lat, AIRPORT.lng, '#ef4444', '✈️', '인천국제공항', true);

  const pts = data.transit || [];
  renderCards(pts);
  pts.forEach(p=>addMarker(p.lat,p.lng,p.color,p.icon,p.name));

  // 출발지 마커
  if(data.origin) {
    const om = new naver.maps.Marker({
      position: new naver.maps.LatLng(data.origin.lat, data.origin.lng),
      map: nmap,
      icon: {
        content: `<div style="background:#f97316;border:3px solid #fff;border-radius:50%;width:16px;height:16px;box-shadow:0 2px 10px rgba(249,115,22,.8);"></div>`,
        anchor: new naver.maps.Point(8,8),
      },
      title: data.origin.name,
      zIndex: 20,
    });
    markers.push(om);
  }

  if(data.path) drawPath(data.path);

  // 출발지~공항 bounds에 맞게 지도 조정
  if(data.origin) {
    const bounds = new naver.maps.LatLngBounds(
      new naver.maps.LatLng(Math.min(data.origin.lat, AIRPORT.lat) - 0.05, Math.min(data.origin.lng, AIRPORT.lng) - 0.05),
      new naver.maps.LatLng(Math.max(data.origin.lat, AIRPORT.lat) + 0.05, Math.max(data.origin.lng, AIRPORT.lng) + 0.05)
    );
    nmap.fitBounds(bounds);
  } else if(data.focus) {
    nmap.setCenter(new naver.maps.LatLng(data.focus.lat, data.focus.lng));
    nmap.setZoom(12);
  }

  if(data.highlight) setTimeout(()=>hlCard(data.highlight),400);
}

// ── Apps SDK 연동 ─────────────────────────────────────────────────────────────
try {
  if(window.openai){applyData(window.openai.toolOutput);window.openai.onToolOutput=applyData;}
  window.addEventListener('message',e=>{
    if(e.data?.method==='ui/notifications/tool-result') applyData(e.data?.params?.structuredContent);
    if(e.data?.result?.structuredContent) applyData(e.data.result.structuredContent);
  });
} catch(e){}

initMap();
</script>
</body>
</html>
