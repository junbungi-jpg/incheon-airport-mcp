<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인천공항 교통 안내</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#0f1117; color:#fff; font-family:-apple-system,sans-serif; overflow:hidden; }
    #root { display:flex; flex-direction:column; width:100vw; height:100vh; }
    #hd { padding:12px 16px; background:#0f1117; border-bottom:1px solid #1e2030; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    #hd h1 { font-size:14px; font-weight:700; margin:0; }
    #hd p  { font-size:11px; color:#6b7280; margin:2px 0 0; }
    #ft { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
    #ft::-webkit-scrollbar { display:none; }
    .fb { padding:4px 12px; border-radius:20px; border:1px solid #2d3148; background:transparent; color:#9ca3af; font-size:11px; cursor:pointer; white-space:nowrap; }
    .fb.on { background:#3b82f6; border-color:#3b82f6; color:#fff; font-weight:600; }
    #mw { flex:1; position:relative; min-height:0; }
    #cv { position:absolute; top:0; left:0; width:100%; height:100%; cursor:grab; display:block; }
    #cv:active { cursor:grabbing; }
    #zb { position:absolute; top:10px; right:10px; z-index:10; display:flex; flex-direction:column; gap:4px; }
    .zbt { width:28px; height:28px; background:rgba(20,23,32,.9); border:1px solid #2d3148; border-radius:6px; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    #cw { position:absolute; bottom:0; left:0; right:0; z-index:10; padding:0 12px 12px; }
    #cards { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
    #cards::-webkit-scrollbar { display:none; }
    .card { flex-shrink:0; width:185px; background:rgba(15,17,23,.96); border:1px solid #2d3148; border-radius:12px; padding:11px; cursor:pointer; transition:all .2s; }
    .card:hover,.card.on { border-color:#3b82f6; transform:translateY(-2px); }
    .ct { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .ci { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .cn { font-size:12px; font-weight:700; }
    .cl { font-size:10px; color:#6b7280; }
    .cs { display:flex; gap:5px; }
    .st { flex:1; background:#1a1d2e; border-radius:6px; padding:5px; text-align:center; }
    .sv { font-size:10px; font-weight:700; }
    .sl { font-size:9px; color:#6b7280; margin-top:1px; }
    #tip { position:absolute; z-index:20; background:rgba(15,17,23,.97); border:1px solid #2d3148; border-radius:10px; padding:10px 12px; pointer-events:none; display:none; min-width:150px; }
    .tn { font-size:12px; font-weight:700; margin-bottom:3px; }
    .tb { display:flex; gap:4px; margin-top:4px; }
    .bx { font-size:10px; padding:2px 6px; border-radius:6px; font-weight:600; }
    .b1 { background:rgba(59,130,246,.25); color:#60a5fa; }
    .b2 { background:rgba(34,197,94,.25); color:#4ade80; }
  </style>
</head>
<body>
<div id="root">
  <div id="hd">
    <span style="font-size:18px">✈️</span>
    <div><h1 id="ht">인천공항 교통 안내</h1><p id="hs">출발지 주변 교통편을 확인하세요</p></div>
  </div>
  <div id="ft">
    <button class="fb on" onclick="setF('all',this)">전체</button>
    <button class="fb" onclick="setF('rail',this)">🚇 철도</button>
    <button class="fb" onclick="setF('bus',this)">🚌 버스</button>
    <button class="fb" onclick="setF('taxi',this)">🚕 택시</button>
  </div>
  <div id="mw">
    <canvas id="cv"></canvas>
    <div id="zb">
      <button class="zbt" onclick="doZ(1.3)">+</button>
      <button class="zbt" onclick="doZ(.77)">−</button>
    </div>
    <div id="tip">
      <div class="tn" id="tn"></div>
      <div style="font-size:10px;color:#6b7280;margin-bottom:2px" id="tl"></div>
      <div class="tb"><span class="bx b1" id="tt"></span><span class="bx b2" id="tp"></span></div>
    </div>
    <div id="cw"><div id="cards"></div></div>
  </div>
</div>

<script>
const PTS=[
  {id:"arex1",type:"rail",  name:"공항철도 직통",icon:"🚇",color:"#3b82f6",lat:37.5546,lng:126.9706,loc:"서울역",    time:"43분",     price:"11,000원",       gap:"30분"},
  {id:"arex2",type:"rail",  name:"공항철도 일반",icon:"🚇",color:"#60a5fa",lat:37.5550,lng:126.9714,loc:"서울역",    time:"66분",     price:"4,150원",        gap:"6~12분"},
  {id:"bus1", type:"bus",   name:"리무진 6103", icon:"🚌",color:"#22c55e",lat:37.4979,lng:127.0276,loc:"강남역",    time:"80~110분", price:"17,000원",       gap:"15~20분"},
  {id:"bus2", type:"bus",   name:"리무진 6001", icon:"🚌",color:"#4ade80",lat:37.5133,lng:127.1000,loc:"잠실역",    time:"70~100분", price:"17,000원",       gap:"20~30분"},
  {id:"bus3", type:"bus",   name:"리무진 6020", icon:"🚌",color:"#86efac",lat:37.5636,lng:126.9869,loc:"명동",      time:"60~90분",  price:"15,000원",       gap:"15~20분"},
  {id:"bus4", type:"bus",   name:"리무진 6030", icon:"🚌",color:"#bbf7d0",lat:37.5552,lng:126.9368,loc:"신촌·홍대", time:"50~80분",  price:"15,000원",       gap:"20분"},
  {id:"taxi1",type:"taxi",  name:"택시",        icon:"🚕",color:"#f59e0b",lat:37.5665,lng:126.9780,loc:"서울 시내", time:"50~90분",  price:"60,000~90,000원",gap:"24시간"},
  {id:"apt",  type:"airport",name:"인천국제공항",icon:"✈️",color:"#ef4444",lat:37.4602,lng:126.4407,loc:"인천 중구"},
];

const cv=document.getElementById('cv');
const x2d=cv.getContext('2d');
let W=800,H=500,sc=1,ox=0,oy=0,drag=false,dx=0,dy=0,hov=null,filt='all';
const CLA=37.52,CLN=126.75;

function sizeCanvas(){
  const mw=document.getElementById('mw');
  // getBoundingClientRect가 더 신뢰할 수 있음
  const rect=mw.getBoundingClientRect();
  W=rect.width||mw.offsetWidth||800;
  H=rect.height||mw.offsetHeight||500;
  if(W<10)W=800;
  if(H<10)H=500;
  cv.width=W;
  cv.height=H;
}

function ll(lat,lng){
  const s=W*sc/1.8;
  return{x:(lng-CLN)*s+W/2+ox, y:-(lat-CLA)*s*1.2+H/2+oy};
}

function drawBg(){
  x2d.fillStyle='#141720';x2d.fillRect(0,0,W,H);
  // 격자
  x2d.strokeStyle='#1e2233';x2d.lineWidth=0.5;
  const st=Math.max(30,50*sc);
  const sx=((ox%st)+st)%st,sy=((oy%st)+st)%st;
  x2d.beginPath();
  for(let x=sx-st;x<W+st;x+=st){x2d.moveTo(x,0);x2d.lineTo(x,H);}
  for(let y=sy-st;y<H+st;y+=st){x2d.moveTo(0,y);x2d.lineTo(W,y);}
  x2d.stroke();
  // 한강
  const hr=[[37.52,126.78],[37.53,126.85],[37.525,126.90],[37.52,126.94],[37.515,127.00],[37.52,127.08]];
  x2d.strokeStyle='#1a2a4a';x2d.lineWidth=Math.max(4,10*sc);x2d.lineCap='round';x2d.lineJoin='round';
  x2d.beginPath();hr.forEach(([a,b],i)=>{const p=ll(a,b);i?x2d.lineTo(p.x,p.y):x2d.moveTo(p.x,p.y);});x2d.stroke();
  // 도로
  const roads=[
    [[37.32,127.05],[37.56,126.98]],
    [[37.51,126.88],[37.51,127.08]],
    [[37.54,126.88],[37.54,127.08]],
    [[37.46,126.44],[37.50,126.76],[37.52,126.88]],
  ];
  x2d.strokeStyle='#252a3d';x2d.lineWidth=Math.max(1,2*sc);x2d.lineCap='round';
  roads.forEach(r=>{
    x2d.beginPath();r.forEach(([a,b],i)=>{const p=ll(a,b);i?x2d.lineTo(p.x,p.y):x2d.moveTo(p.x,p.y);});x2d.stroke();
  });
}

function drawMarkers(){
  const vis=filt==='all'?PTS:PTS.filter(p=>p.type===filt||p.type==='airport');
  vis.forEach(p=>{
    const{x,y}=ll(p.lat,p.lng);
    if(x<-30||x>W+30||y<-30||y>H+30)return;
    const r=p.type==='airport'?10:7,isH=hov===p.id;
    // 글로우
    if(isH||p.type==='airport'){
      const g=x2d.createRadialGradient(x,y,r,x,y,r+10);
      g.addColorStop(0,p.color+'66');g.addColorStop(1,'transparent');
      x2d.beginPath();x2d.arc(x,y,r+10,0,Math.PI*2);x2d.fillStyle=g;x2d.fill();
    }
    x2d.beginPath();x2d.arc(x,y,isH?r+2:r,0,Math.PI*2);
    x2d.fillStyle=p.color;x2d.fill();
    x2d.strokeStyle='#fff';x2d.lineWidth=isH?2.5:1.5;x2d.stroke();
    // 라벨
    x2d.font=`${Math.min(11,Math.max(8,9*sc))}px -apple-system,sans-serif`;
    x2d.fillStyle='rgba(255,255,255,0.85)';x2d.textAlign='center';
    if(p.type==='airport'){
      x2d.font=`bold ${Math.min(12,10*sc)}px -apple-system,sans-serif`;
      x2d.fillStyle='#fff';
      x2d.fillText('인천공항',x,y-r-5);
    } else if(sc>0.6){
      x2d.fillText(p.name.length>6?p.name.slice(0,5)+'…':p.name,x,y+r+11);
    }
  });
}

function draw(){
  if(!W||!H)return;
  x2d.clearRect(0,0,W,H);
  drawBg();drawMarkers();
}

function init(){
  sizeCanvas();draw();renderCards();
}

function doZ(f){sc=Math.min(5,Math.max(.25,sc*f));draw();}

// 마우스 이벤트
cv.addEventListener('mousedown',e=>{drag=true;dx=e.clientX;dy=e.clientY;});
cv.addEventListener('mousemove',e=>{
  if(drag){ox+=e.clientX-dx;oy+=e.clientY-dy;dx=e.clientX;dy=e.clientY;draw();}
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  let f=null;PTS.forEach(p=>{const q=ll(p.lat,p.lng);if(Math.hypot(mx-q.x,my-q.y)<14)f=p;});
  hov=f?f.id:null;draw();showTip(f,e.clientX,e.clientY);
});
cv.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('mouseleave',()=>{drag=false;hov=null;hideTip();draw();});
cv.addEventListener('wheel',e=>{e.preventDefault();doZ(e.deltaY<0?1.15:.87);},{passive:false});

// 터치
let ld=0;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;dx=e.touches[0].clientX;dy=e.touches[0].clientY;}
  else if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){ox+=e.touches[0].clientX-dx;oy+=e.touches[0].clientY-dy;dx=e.touches[0].clientX;dy=e.touches[0].clientY;draw();}
  else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);doZ(d/ld);ld=d;}
},{passive:false});
cv.addEventListener('touchend',()=>drag=false);

function showTip(p,cx,cy){
  const tip=document.getElementById('tip');
  if(!p||p.type==='airport'){hideTip();return;}
  document.getElementById('tn').textContent=p.icon+' '+p.name;
  document.getElementById('tl').textContent=p.loc;
  document.getElementById('tt').textContent='⏱ '+p.time;
  document.getElementById('tp').textContent='💰 '+p.price;
  tip.style.display='block';
  const mwR=document.getElementById('mw').getBoundingClientRect();
  let tx=cx-mwR.left+14,ty=cy-mwR.top-85;
  if(tx+170>W)tx-=185;if(ty<0)ty=8;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}
function hideTip(){document.getElementById('tip').style.display='none';}

function renderCards(){
  const list=filt==='all'?PTS.filter(p=>p.type!=='airport'):PTS.filter(p=>p.type===filt);
  document.getElementById('cards').innerHTML=list.map(p=>`
    <div class="card" id="c-${p.id}" onclick="focusPt('${p.id}')">
      <div class="ct">
        <div class="ci" style="background:${p.color}22">${p.icon}</div>
        <div><div class="cn">${p.name}</div><div class="cl">${p.loc}</div></div>
      </div>
      <div class="cs">
        <div class="st"><div class="sv">${p.time}</div><div class="sl">소요</div></div>
        <div class="st"><div class="sv" style="font-size:9px">${p.price}</div><div class="sl">요금</div></div>
        <div class="st"><div class="sv" style="font-size:9px">${p.gap||'-'}</div><div class="sl">간격</div></div>
      </div>
    </div>`).join('');
}

function focusPt(id){
  const p=PTS.find(x=>x.id===id);if(!p)return;
  const{x,y}=ll(p.lat,p.lng);ox+=W/2-x;oy+=H/2-y;
  hov=id;draw();hlCard(id);
}

function hlCard(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c-'+id);
  if(c){c.classList.add('on');c.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
}

function setF(type,btn){
  filt=type;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderCards();draw();
}

function applyData(data){
  if(!data)return;
  if(data.title)document.getElementById('ht').textContent=data.title;
  if(data.subtitle)document.getElementById('hs').textContent=data.subtitle;
  if(data.focus){const{x,y}=ll(data.focus.lat,data.focus.lng);ox+=W/2-x;oy+=H/2-y;sc=1.3;draw();}
  if(data.highlight)setTimeout(()=>hlCard(data.highlight),400);
}

// Apps SDK 연동
try{
  if(window.openai){applyData(window.openai.toolOutput);window.openai.onToolOutput=applyData;}
  window.addEventListener('message',e=>{
    if(e.data?.method==='ui/notifications/tool-result')applyData(e.data?.params?.structuredContent);
    if(e.data?.result?.structuredContent)applyData(e.data.result.structuredContent);
  });
}catch(e){}

// 핵심: 여러 타이밍에 init 시도 (iframe 안에서 크기가 늦게 잡힐 수 있음)
document.addEventListener('DOMContentLoaded', ()=>{
  init();
  // iframe 안에서 크기가 0으로 잡히는 경우를 대비해 딜레이 후 재시도
  setTimeout(init, 100);
  setTimeout(init, 500);
});
window.addEventListener('resize', ()=>{sizeCanvas();draw();});
</script>
</body>
</html>
